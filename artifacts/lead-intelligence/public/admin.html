<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="container">
  <h1>📊 Admin Dashboard</h1>

  <div id="stats"></div>

  <!-- Charts Row -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Segment Distribution</div>
      <div class="chart-wrap">
        <canvas id="segmentChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Avg Score by Segment</div>
      <div class="chart-wrap">
        <canvas id="scoreChart"></canvas>
      </div>
    </div>
  </div>

  <div class="filters">
    <button onclick="filterLeads('ALL')">All</button>
    <button onclick="filterLeads('HOT')">HOT</button>
    <button onclick="filterLeads('WARM')">WARM</button>
    <button onclick="filterLeads('COLD')">COLD</button>
  </div>

  <div id="leadsContainer"></div>
</div>

<!-- Summary Modal -->
<div id="modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="admin.js"></script>

</body>
</html>
