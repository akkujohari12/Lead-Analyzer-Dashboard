<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Admin Dashboard</h1>

  <div id="stats"></div>

  <div class="filters">
    <button onclick="filterLeads('ALL')">All</button>
    <button onclick="filterLeads('HOT')">HOT</button>
    <button onclick="filterLeads('WARM')">WARM</button>
    <button onclick="filterLeads('COLD')">COLD</button>
  </div>

  <div id="leadsContainer"></div>
</div>

<!-- Summary Modal -->
<div id="modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="admin.js"></script>

</body>
</html>
